<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Guardian</title>
    
    <!-- Link to the official app configuration -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc3545">

    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: white; max-width: 400px; margin: 30px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-login { background: #007bff; color: white; }
        .btn-sos { background: #dc3545; color: white; font-size: 20px; padding: 20px; }
        .btn-feature { background: #6c757d; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-back { background: #e0e0e0; color: #333; margin-top: 15px; }
        .contact-box { background-color: #f8f9fa; border-left: 5px solid #28a745; padding: 15px; margin-top: 20px; border-radius: 5px; text-align: left; }
        .contact-box a { color: #dc3545; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <!-- 🔐 LOGIN PAGE -->
    <div id="loginPage" class="card">
        <h2>AI Guardian Login</h2>
        <input type="email" id="email" placeholder="Enter Email" value="user@safety.com">
        <input type="password" id="password" placeholder="Enter Password" value="123456">
        <button class="btn-login" onclick="showHome()">Login</button>
    </div>

    <!-- 🏠 HOME PAGE -->
    <div id="homePage" class="card hidden">
        <h2>AI Guardian Dashboard</h2>
        
        <!-- 🚨 Functional SOS Button -->
        <button class="btn-sos" onclick="triggerSOS()">🚨 Trigger SOS</button>
        
        <!-- 📍 Functional Location Share -->
        <button class="btn-feature" onclick="shareLocation()">📍 Share Location</button>
        
        <!-- 👨‍👩‍👧 Emergency Contacts Toggle -->
        <button class="btn-feature" onclick="showContacts()">👨‍👩‍👧 Emergency Contacts</button>
        
        <br><br>
        <a href="#" onclick="showLogin()">Logout</a>
    </div>

    <!-- 👨‍👩‍👧 EMERGENCY CONTACTS PAGE -->
    <div id="contactsPage" class="card hidden">
        <h2>Manage Contacts</h2>
        <p>Save a trusted person's number below:</p>
        
        <input type="text" id="contactName" placeholder="Contact Name">
        <input type="tel" id="contactPhone" placeholder="Phone Number">
        <button class="btn-success" onclick="saveContact()">💾 Save Contact</button>
        
        <!-- Display area for the saved contact -->
        <div id="savedContactDisplay" class="contact-box hidden"></div>
        
        <button class="btn-back" onclick="showHomeFromContacts()">⬅️ Back to Dashboard</button>
    </div>

    <script>
        // 🚀 Register the Service Worker to make it an installable app
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Run this immediately when the script loads to check for any existing saved contact
        loadSavedContact();

        function showHome() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('homePage').classList.remove('hidden');
            document.getElementById('contactsPage').classList.add('hidden');
        }
        
        function showLogin() {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('contactsPage').classList.add('hidden');
        }

        function showContacts() {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('contactsPage').classList.remove('hidden');
        }

        function showHomeFromContacts() {
            document.getElementById('contactsPage').classList.add('hidden');
            document.getElementById('homePage').classList.remove('hidden');
        }

        // Save contact locally in the browser
        function saveContact() {
            const nameInput = document.getElementById('contactName');
            const phoneInput = document.getElementById('contactPhone');
            
            const name = nameInput.value.trim();
            const phone = phoneInput.value.trim();

            if (name === '' || phone === '') {
                alert('Please enter both a name and a phone number.');
                return;
            }

            // Store details in localStorage so it persists on page refreshes
            localStorage.setItem('emergencyName', name);
            localStorage.setItem('emergencyPhone', phone);

            // Update UI view
            displayContactHTML(name, phone);

            // Reset inputs
            nameInput.value = '';
            phoneInput.value = '';
            
            alert('Contact saved successfully!');
        }

        // Pull saved contact from memory and update interface
        function loadSavedContact() {
            const savedName = localStorage.getItem('emergencyName');
            const savedPhone = localStorage.getItem('emergencyPhone');

            if (savedName && savedPhone) {
                displayContactHTML(savedName, savedPhone);
            }
        }

        // Utility helper to inject display block styling
        function displayContactHTML(name, phone) {
            const displayBox = document.getElementById('savedContactDisplay');
            displayBox.innerHTML = `
                <strong>Trusted Contact Saved:</strong><br><br>
                👤 Name: ${name}<br>
                📞 Call: <a href="tel:${phone}">${phone}</a>
            `;
            displayBox.classList.remove('hidden');
        }

        // 🚨 Activating the SOS feature to make a real emergency phone call
        function triggerSOS() {
            // Check if user has a custom trusted contact saved
            const savedPhone = localStorage.getItem('emergencyPhone');
            const targetNumber = savedPhone ? savedPhone : "112";
            const targetName = savedPhone ? localStorage.getItem('emergencyName') : "emergency services (112)";

            if (confirm(`Do you want to emergency call ${targetName} right now?`)) {
                window.location.href = `tel:${targetNumber}`; 
            }
        }

        // 📍 Activating the Real Location Share Feature
        function shareLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    let lat = position.coords.latitude;
                    let lon = position.coords.longitude;
                    // Generates a real google maps link with your exact live location
                    let mapsUrl = `https://google.com{lat},${lon}`;
                    
                    if (navigator.share) {
                        navigator.share({
                            title: 'AI Guardian Emergency Location',
                            text: 'I need help! Here is my live location:',
                            url: mapsUrl
                        });
                    } else {
                        alert(`Your Location:\nLatitude: ${lat}\nLongitude: ${lon}\n\nLink: ${mapsUrl}`);
                    }
                }, function() {
                    alert("Unable to retrieve location. Please check GPS settings.");
                });
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        }
    </script>
</body>
</html>
